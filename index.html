<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klarity — Traducteur d'articles Intercom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F0F4FF; --surface: #FFFFFF; --surface2: #F5F7FF;
    --border: #E2E8F8; --accent: #3762E3; --accent-light: #EEF3FF; --accent-hover: #2952CC;
    --text: #1A1F36; --text-muted: #6B7280; --text-dim: #A0A8C0;
    --success: #16A34A; --success-bg: #F0FDF4; --success-border: #BBF7D0;
    --error: #DC2626; --error-bg: #FEF2F2; --error-border: #FECACA;
    --warning: #B45309; --warning-bg: #FFFBEB; --warning-border: #FDE68A;
    --info: #3762E3; --info-bg: #EEF3FF; --info-border: #BFDBFE;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2.5rem 1rem 4rem; }
  .logo-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 0.4rem; }
  .logo-name { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); line-height: 1; }
  .logo-name span { color: var(--accent); }
  .tagline { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 2rem; }
  .card { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; box-shadow: 0 1px 4px rgba(55,98,227,0.06), 0 4px 24px rgba(55,98,227,0.04); }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
  .lang-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 1.5rem; }
  .lang-chip { position: relative; cursor: pointer; }
  .lang-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
  .lang-chip-inner { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 9px 4px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); transition: border-color 0.15s, background 0.15s; }
  .lang-chip-inner .flag { font-size: 18px; line-height: 1; }
  .lang-chip-inner .code { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.05em; }
  .lang-chip input:checked + .lang-chip-inner { border-color: var(--accent); background: var(--accent-light); }
  .lang-chip input:checked + .lang-chip-inner .code { color: var(--accent); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .mode-tabs { display: flex; gap: 0; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .mode-tab { flex: 1; padding: 8px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--surface2); color: var(--text-muted); border: none; font-family: Inter, sans-serif; transition: all 0.15s; }
  .mode-tab.active { background: var(--accent); color: #fff; }
  .input-wrap { position: relative; margin-bottom: 1rem; }
  .input-wrap input, .input-wrap textarea { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: Inter, sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; }
  .input-wrap input:focus, .input-wrap textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(55,98,227,0.1); }
  .input-wrap input::placeholder, .input-wrap textarea::placeholder { color: var(--text-dim); }
  .input-wrap textarea { resize: vertical; line-height: 1.5; }
  .input-icon { position: absolute; left: 13px; top: 12px; color: var(--text-dim); font-size: 13px; pointer-events: none; }
  .input-with-icon { padding-left: 36px !important; }
  select.field-select { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: Inter, sans-serif; color: var(--text); outline: none; margin-bottom: 1rem; cursor: pointer; }
  select.field-select:focus { border-color: var(--accent); }
  .articles-list { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 1rem; max-height: 150px; overflow-y: auto; display: none; }
  .articles-count { font-size: 12px; color: var(--accent); margin-bottom: 6px; font-weight: 500; }
  .articles-list-item { font-size: 12px; color: var(--text-muted); padding: 3px 0; border-bottom: 1px solid var(--border); }
  .articles-list-item:last-child { border-bottom: none; }
  .btn-main { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: Inter, sans-serif; cursor: pointer; transition: background 0.15s; }
  .btn-main:hover { background: var(--accent-hover); }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 1rem; display: none; line-height: 1.5; }
  .s-info    { background: var(--info-bg);    color: var(--info);    border: 1px solid var(--info-border); }
  .s-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
  .s-error   { background: var(--error-bg);   color: var(--error);   border: 1px solid var(--error-border); }
  .preview { font-size: 13px; color: var(--text-muted); padding: 10px 14px; background: var(--accent-light); border-radius: 8px; margin-bottom: 1rem; display: none; line-height: 1.5; border-left: 3px solid var(--accent); }
  .preview strong { color: var(--text); font-weight: 500; display: block; margin-bottom: 2px; }
  .steps { display: none; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
  .step { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-dim); }
  .step-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
  .step.active { color: var(--accent); }
  .step.active .step-dot { background: var(--info-bg); border-color: var(--accent); color: var(--accent); }
  .step.done { color: var(--text-muted); }
  .step.done .step-dot { background: var(--success-bg); border-color: var(--success); color: var(--success); }
  .step.skipped .step-dot { color: var(--text-dim); }
  .step.error-step { color: var(--error); }
  .step.error-step .step-dot { background: var(--error-bg); border-color: var(--error); color: var(--error); }
  .confirm-box { background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; display: none; }
  .confirm-box p { font-size: 13px; color: var(--warning); margin-bottom: 8px; line-height: 1.5; }
  .lang-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .lang-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; background: #FEF3C7; border: 1px solid #FCD34D; border-radius: 4px; color: #92400E; }
  .confirm-buttons { display: flex; gap: 8px; }
  .confirm-buttons button { flex: 1; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: Inter, sans-serif; }
  .btn-overwrite { background: var(--accent); color: #fff; border: none; }
  .btn-skip { background: #fff; color: var(--text-muted); border: 1px solid var(--border); }
  .worker-row { display: flex; align-items: center; gap: 8px; margin-top: 1rem; }
  .worker-row label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .worker-row input { flex: 1; padding: 5px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; font-family: monospace; color: var(--text-muted); outline: none; }
  .footer-note { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 1.25rem; }
</style>
</head>
<body>

<div class="logo-wrap">
  <svg width="36" height="38" viewBox="0 0 60 50" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-top:4px;">
    <rect x="0" y="0" width="60" height="11" rx="5.5" fill="#3762E3"/>
    <rect x="10" y="16" width="50" height="11" rx="5.5" fill="#3762E3" opacity="0.55"/>
    <rect x="30" y="32" width="26" height="9" rx="4.5" fill="#3762E3" opacity="0.26"/>
  </svg>
  <div class="logo-name"><span>K</span>larity</div>
</div>
<p class="tagline">Traduction automatique des articles Intercom &mdash; Kizeo Forms / Klear / Karr&eacute;</p>

<div class="card">
  <div class="section-label">Langues cibles</div>
  <div class="lang-grid">
    <label class="lang-chip"><input type="checkbox" value="en"><div class="lang-chip-inner"><span class="flag">&#127468;&#127463;</span><span class="code">EN</span></div></label>
    <label class="lang-chip"><input type="checkbox" value="es"><div class="lang-chip-inner"><span class="flag">&#127466;&#127480;</span><span class="code">ES</span></div></label>
    <label class="lang-chip"><input type="checkbox" value="de"><div class="lang-chip-inner"><span class="flag">&#127465;&#127466;</span><span class="code">DE</span></div></label>
    <label class="lang-chip"><input type="checkbox" value="it"><div class="lang-chip-inner"><span class="flag">&#127470;&#127481;</span><span class="code">IT</span></div></label>
    <label class="lang-chip"><input type="checkbox" value="nl"><div class="lang-chip-inner"><span class="flag">&#127475;&#127473;</span><span class="code">NL</span></div></label>
    <label class="lang-chip"><input type="checkbox" value="pl"><div class="lang-chip-inner"><span class="flag">&#127477;&#127473;</span><span class="code">PL</span></div></label>
    <label class="lang-chip"><input type="checkbox" value="pt"><div class="lang-chip-inner"><span class="flag">&#127477;&#127481;</span><span class="code">PT</span></div></label>
  </div>

  <hr class="divider">

  <div class="section-label">Articles a traduire</div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('articles')">Par articles</button>
    <button class="mode-tab" onclick="switchMode('collection')">Par collection</button>
  </div>

  <div id="mode-articles">
    <div class="input-wrap">
      <textarea id="article-ids" rows="3" placeholder="Un ID ou lien par ligne, ou separes par des virgules&#10;ex : 15532716, 13833465"></textarea>
    </div>
  </div>

  <div id="mode-collection" style="display:none;">
    <select class="field-select" id="helpcenter-select" onchange="onHelpCenterChange()">
      <option value="">Selectionnez une base de connaissance...</option>
    </select>
    <select class="field-select" id="collection-select" onchange="onCollectionChange()" style="display:none;">
      <option value="">Selectionnez une collection...</option>
    </select>
    <div class="articles-list" id="articles-list">
      <div class="articles-count" id="articles-count"></div>
      <div id="articles-list-items"></div>
    </div>
  </div>

  <div class="input-wrap">
    <input type="password" id="anthropic-key" placeholder="Cle API Anthropic (sk-ant-...)" onchange="saveKey()">
  </div>

  <div class="preview" id="preview"></div>
  <div class="status" id="status"></div>

  <div class="confirm-box" id="confirm-box">
    <p>Ces langues ont deja une traduction :</p>
    <div class="lang-tags" id="existing-tags"></div>
    <p>Veux-tu les ecraser ou les ignorer ?</p>
    <div class="confirm-buttons">
      <button class="btn-overwrite" onclick="confirmChoice('overwrite')">Ecraser</button>
      <button class="btn-skip" onclick="confirmChoice('skip')">Ignorer</button>
    </div>
  </div>

  <div class="steps" id="steps"></div>
  <button class="btn-main" id="btn" onclick="run()">Traduire les articles</button>

  <div class="worker-row">
    <label>Worker</label>
    <input type="text" id="worker-url" value="https://intercom-translate.maio-803.workers.dev">
  </div>
</div>

<p class="footer-note">Les traductions sont creees en brouillon — pense a les relire avant de publier.</p>

<script>
var langNames = { en:'Anglais', es:'Espagnol', de:'Allemand', it:'Italien', nl:'Neerlandais', pl:'Polonais', pt:'Portugais' };
var langLabels = { en:'anglais', es:'espagnol', de:'allemand', it:'italien', nl:'neerlandais', pl:'polonais', pt:'portugais' };
var currentMode = 'articles';
var collectionArticleIds = [];
var pendingResolve = null;

window.addEventListener('DOMContentLoaded', function() {
  var saved = localStorage.getItem('klarity_anthropic_key');
  if (saved) document.getElementById('anthropic-key').value = saved;
});

function saveKey() {
  var key = document.getElementById('anthropic-key').value.trim();
  if (key) localStorage.setItem('klarity_anthropic_key', key);
}

function getWorker() { return document.getElementById('worker-url').value.trim(); }
function getAnthropicKey() { return document.getElementById('anthropic-key').value.trim(); }

function getLangs() {
  return Array.from(document.querySelectorAll('.lang-chip input:checked')).map(function(c) { return c.value; });
}

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status s-' + type;
  el.style.display = 'block';
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(function(t, i) {
    t.classList.toggle('active', (i === 0 && mode === 'articles') || (i === 1 && mode === 'collection'));
  });
  document.getElementById('mode-articles').style.display = mode === 'articles' ? 'block' : 'none';
  document.getElementById('mode-collection').style.display = mode === 'collection' ? 'block' : 'none';
  if (mode === 'collection') loadHelpCenters();
}

function loadHelpCenters() {
  var select = document.getElementById('helpcenter-select');
  if (select.options.length > 1) return;
  fetch(getWorker() + '/get-help-centers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: '{}'
  }).then(function(r) { return r.json(); }).then(function(data) {
    select.innerHTML = '<option value="">Selectionnez une base de connaissance...</option>';
    (data.data || []).forEach(function(hc) {
      var opt = document.createElement('option');
      opt.value = hc.id;
      opt.textContent = hc.display_name || hc.identifier;
      select.appendChild(opt);
    });
  }).catch(function() {
    select.innerHTML = '<option value="">Erreur de chargement</option>';
  });
}

function onHelpCenterChange() {
  var hcId = document.getElementById('helpcenter-select').value;
  var collSelect = document.getElementById('collection-select');
  var listEl = document.getElementById('articles-list');
  listEl.style.display = 'none';
  collectionArticleIds = [];
  if (!hcId) { collSelect.style.display = 'none'; return; }
  collSelect.style.display = 'block';
  collSelect.innerHTML = '<option value="">Chargement...</option>';
  fetch(getWorker() + '/get-collections', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ help_center_id: hcId })
  }).then(function(r) { return r.json(); }).then(function(data) {
    collSelect.innerHTML = '<option value="">Selectionnez une collection...</option>';
    (data.data || []).forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = (c.parent_id ? '  \u2514 ' : '') + (c.name || c.id);
      collSelect.appendChild(opt);
    });
  }).catch(function() {
    collSelect.innerHTML = '<option value="">Erreur</option>';
  });
}

function onCollectionChange() {
  var collectionId = document.getElementById('collection-select').value;
  var listEl = document.getElementById('articles-list');
  if (!collectionId) { listEl.style.display = 'none'; return; }
  listEl.style.display = 'block';
  document.getElementById('articles-count').textContent = 'Chargement...';
  document.getElementById('articles-list-items').innerHTML = '';
  collectionArticleIds = [];
  fetch(getWorker() + '/get-collection-articles', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ collection_id: collectionId })
  }).then(function(r) { return r.json(); }).then(function(data) {
    collectionArticleIds = data.article_ids || [];
    document.getElementById('articles-count').textContent = collectionArticleIds.length + ' article(s) trouve(s)';
    document.getElementById('articles-list-items').innerHTML = (data.articles || [])
      .map(function(a) { return '<div class="articles-list-item">' + a.title + '</div>'; }).join('');
  }).catch(function() {
    document.getElementById('articles-count').textContent = 'Erreur';
  });
}

function extractArticleId(input) {
  var trimmed = input.trim();
  var match = trimmed.match(/articles\/([0-9]+)/);
  if (match) return match[1];
  return trimmed.replace(/[^0-9]/g, '');
}

function extractAllArticleIds(input) {
  var parts = input.split(/[,;\n]+/).map(function(s) { return s.trim(); }).filter(Boolean);
  return parts.map(extractArticleId).filter(function(id) { return id.length > 0; });
}

function buildSteps(langs, suffix) {
  var container = document.getElementById('steps');
  container.innerHTML = '';
  var s = suffix || '';
  function mkStep(id, icon, label) {
    var el = document.createElement('div');
    el.className = 'step'; el.id = id;
    el.innerHTML = '<div class="step-dot">' + icon + '</div> ' + label;
    container.appendChild(el);
  }
  mkStep('step-fetch', 'v', 'Recuperation de l\'article' + s);
  langs.forEach(function(lang) { mkStep('step-' + lang, 'A', 'Traduction ' + langNames[lang]); });
  mkStep('step-push', '^', 'Envoi dans Intercom');
  container.style.display = 'flex';
}

function setStep(id, state) {
  var el = document.getElementById(id);
  if (!el) return;
  el.className = 'step ' + (state === 'error' ? 'error-step' : state);
  var dot = el.querySelector('.step-dot');
  if (state === 'done') dot.textContent = 'v';
  else if (state === 'active') dot.textContent = '...';
  else if (state === 'error') dot.textContent = 'x';
  else if (state === 'skipped') dot.textContent = '-';
}

function postWorker(path, body) {
  return fetch(getWorker() + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r) {
    return r.json().then(function(data) {
      if (!r.ok) throw new Error(JSON.stringify(data.error || data));
      return data;
    });
  });
}

function translateChunk(chunk, lang, includeTitle, title) {
  var langName = langLabels[lang] || lang;
  var prompt;
  if (includeTitle) {
    prompt = 'Traduis ce contenu du francais vers l\''+langName+'.\nREGLES: conserve le HTML exactement (balises, attributs), ne traduis pas Klear/Kizeo/Kizeo Forms/Karre, traduis uniquement le texte visible.\nReponds avec un JSON pur: {"title": "...", "body": "..."}\nTitre FR: '+title+'\nBody FR: '+chunk;
  } else {
    prompt = 'Traduis ce contenu du francais vers l\''+langName+'.\nREGLES: conserve le HTML exactement (balises, attributs), ne traduis pas Klear/Kizeo/Kizeo Forms/Karre, traduis uniquement le texte visible.\nReponds avec un JSON pur: {"body": "..."}\nBody FR: '+chunk;
  }
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': getAnthropicKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 8000, messages: [{ role: 'user', content: prompt }] })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) throw new Error(data.error.message);
    var raw = (data.content || []).filter(function(b) { return b.type === 'text'; }).map(function(b) { return b.text; }).join('');
    var start = raw.indexOf('{');
    var end = raw.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('JSON invalide');
    return JSON.parse(raw.slice(start, end + 1));
  });
}

function translateWithClaude(title, body, lang) {
  var MAX = 6000;
  var sections = body.split(/<(?=h2[\s>])/i);
  var chunks = [];
  var current = '';
  sections.forEach(function(s) {
    if ((current + s).length > MAX && current.length > 0) { chunks.push(current); current = s; }
    else current += s;
  });
  if (current) chunks.push(current);

  var translatedTitle = title;
  var translatedChunks = [];

  function processChunk(i) {
    if (i >= chunks.length) {
      return Promise.resolve({ title: translatedTitle, body: translatedChunks.join('') });
    }
    return translateChunk(chunks[i], lang, i === 0, title).then(function(parsed) {
      if (i === 0 && parsed.title) translatedTitle = parsed.title;
      translatedChunks.push(parsed.body || '');
      return processChunk(i + 1);
    }).catch(function() {
      translatedChunks.push(chunks[i]);
      return processChunk(i + 1);
    });
  }
  return processChunk(0);
}

function askConfirm(existingLangs) {
  return new Promise(function(resolve) {
    pendingResolve = resolve;
    document.getElementById('existing-tags').innerHTML = existingLangs.map(function(l) {
      return '<span class="lang-tag">' + langNames[l] + '</span>';
    }).join('');
    document.getElementById('confirm-box').style.display = 'block';
  });
}

function confirmChoice(choice) {
  document.getElementById('confirm-box').style.display = 'none';
  if (pendingResolve) { pendingResolve(choice); pendingResolve = null; }
}

function processArticle(articleId, langs) {
  return postWorker('/get-article', { article_id: articleId }).then(function(article) {
    var frContent = (article.translated_content || {}).fr || {};
    var title = frContent.title || article.title || '';
    var body = frContent.body || article.body || '';

    var preview = document.getElementById('preview');
    preview.innerHTML = '<strong>' + title + '</strong>' + body.replace(/<[^>]+>/g, ' ').substring(0, 120) + '...';
    preview.style.display = 'block';
    setStep('step-fetch', 'done');

    var existingContent = article.translated_content || {};
    var existingLangs = langs.filter(function(l) { return existingContent[l] && existingContent[l].title && existingContent[l].body; });

    var confirmPromise;
    if (existingLangs.length > 0) {
      confirmPromise = askConfirm(existingLangs);
    } else {
      confirmPromise = Promise.resolve('overwrite');
    }

    return confirmPromise.then(function(choice) {
      var langsToSkip = choice === 'skip' ? existingLangs : [];
      var translations = {};

      function translateNext(i) {
        if (i >= langs.length) return Promise.resolve(translations);
        var lang = langs[i];
        if (langsToSkip.indexOf(lang) !== -1) {
          setStep('step-' + lang, 'skipped');
          return translateNext(i + 1);
        }
        setStep('step-' + lang, 'active');
        setStatus('Traduction ' + langNames[lang] + ' en cours...', 'info');
        return translateWithClaude(title, body, lang).then(function(t) {
          translations[lang] = t;
          setStep('step-' + lang, 'done');
          return translateNext(i + 1);
        }).catch(function() {
          setStep('step-' + lang, 'error');
          return translateNext(i + 1);
        });
      }

      return translateNext(0).then(function(translations) {
        var successLangs = langs.filter(function(l) { return translations[l]; });
        if (!successLangs.length) return;
        setStep('step-push', 'active');
        setStatus('Envoi dans Intercom...', 'info');
        return postWorker('/push-translations', { article_id: articleId, translations: translations, langs: successLangs }).then(function() {
          setStep('step-push', 'done');
          return successLangs;
        });
      });
    });
  });
}

function run() {
  var langs = getLangs();
  if (!langs.length) { setStatus('Selectionne au moins une langue.', 'error'); return; }
  if (!getAnthropicKey()) { setStatus('Saisis ta cle API Anthropic.', 'error'); return; }

  var articleIds;
  if (currentMode === 'collection') {
    articleIds = collectionArticleIds.map(String);
    if (!articleIds.length) { setStatus('Selectionne une collection avec des articles.', 'error'); return; }
  } else {
    var raw = document.getElementById('article-ids').value;
    articleIds = extractAllArticleIds(raw);
    if (!articleIds.length) { setStatus('Saisis au moins un ID ou lien d\'article.', 'error'); return; }
  }

  var btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  document.getElementById('confirm-box').style.display = 'none';

  var totalSuccess = 0;
  var totalError = 0;
  var i = 0;

  function nextArticle() {
    if (i >= articleIds.length) {
      btn.disabled = false;
      if (articleIds.length > 1) {
        setStatus('Termine : ' + totalSuccess + ' article(s) traduit(s)' + (totalError > 0 ? ', ' + totalError + ' erreur(s)' : '') + '.', totalError > 0 ? 'error' : 'success');
      }
      return;
    }
    var articleId = articleIds[i];
    var suffix = articleIds.length > 1 ? ' (' + (i+1) + '/' + articleIds.length + ')' : '';
    buildSteps(langs, suffix);
    setStep('step-fetch', 'active');
    setStatus('Recuperation de l\'article...', 'info');
    processArticle(articleId, langs).then(function(successLangs) {
      if (successLangs && successLangs.length) {
        totalSuccess++;
        setStatus('Traductions creees : ' + successLangs.map(function(l) { return langNames[l]; }).join(', '), 'success');
      }
      i++;
      nextArticle();
    }).catch(function(e) {
      totalError++;
      setStatus('Erreur article ' + articleId + ' : ' + e.message, 'error');
      i++;
      nextArticle();
    });
  }

  nextArticle();
}
</script>
